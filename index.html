    <noscript>
      <h1>EEZシミュレーター</h1>
      <p>
        日本の排他的経済水域(EEZ)を地図上に表示し、島をドラッグしたり消したりすると
        EEZがその場で再計算される教育用シミュレーターです。ご利用にはJavaScriptを有効にしてください。
      </p>
      <p>
        EEZは基線から200海里(約370km)まで、隣国と重なる海域は等距離の中間線で分けられます。
        日本のEEZは約447万km²で国土面積(約37.8万km²)の約11.8倍。
        そのうち沖ノ鳥島が約41万km²、小笠原・硫黄列島が約54万km²を生んでいます。
      </p>
